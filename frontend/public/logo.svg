<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Path Line -->
  <path d="M128 384 Q 160 256 256 256 T 384 128" 
        stroke="url(#logo-grad)" 
        stroke-width="48" 
        fill="none" 
        stroke-linecap="round" 
        filter="url(#glow)" />
  
  <!-- AI Core Node -->
  <circle cx="384" cy="128" r="45" fill="white" filter="url(#glow)">
    <animate attributeName="r" values="45;50;45" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Subtle Inner Node -->
  <circle cx="384" cy="128" r="20" fill="#3b82f6" />
  
  <!-- Decorative AI Connection Points -->
  <circle cx="128" cy="384" r="15" fill="#8b5cf6" />
  <circle cx="256" cy="256" r="15" fill="#6366f1" />
</svg>
